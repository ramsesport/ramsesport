name: Update Prices

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices
        run: python3 fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "prices: $(date -u +%H:%M UTC)" && git push)
